<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow | Cronograma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
/* ── LAYOUT ──────────────────────────────────────────────────── */
.pagina {
  max-width: 1100px; margin: 0 auto;
  padding: calc(68px + var(--s4)) var(--s4) var(--s7);
  display: flex; flex-direction: column; gap: var(--s4);
}

/* ── CABEÇALHO ───────────────────────────────────────────────── */
.page-header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: var(--s3); }
.page-header__titulo {
  font-family: var(--font-display); font-size: clamp(26px, 3.5vw, 38px);
  font-weight: 800; letter-spacing: -1.5px; line-height: 1.1;
}
.page-header__titulo span {
  background: linear-gradient(135deg, var(--accent) 0%, #7dd3fc 60%, #bae6fd 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.page-header__sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

.btn-primario-sm {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; background: var(--accent); color: #0d1b2a;
  border: none; border-radius: var(--r-sm); font-family: var(--font-body);
  font-size: 14px; font-weight: 700; cursor: pointer;
  transition: background 0.2s ease, transform 0.15s ease;
  white-space: nowrap;
}
.btn-primario-sm:hover { background: var(--accent-hover); transform: translateY(-1px); }
.btn-primario-sm svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2.5; }

/* ── ALGORITMO INFO ──────────────────────────────────────────── */
.algo-banner {
  background: var(--accent-glow); border: 1px solid var(--border-hover);
  border-radius: var(--r-lg); padding: var(--s3);
  display: flex; align-items: center; gap: var(--s3); flex-wrap: wrap;
}
.algo-banner__icone {
  width: 48px; height: 48px; background: var(--bg-surface); border-radius: var(--r-md);
  border: 1px solid var(--border-hover); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.algo-banner__icone svg { width: 22px; height: 22px; stroke: var(--accent); stroke-width: 2; }
.algo-banner__texto { flex: 1; }
.algo-banner__titulo { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--accent); }
.algo-banner__desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
.algo-banner__formula {
  font-family: var(--font-display); font-size: 18px; font-weight: 800;
  color: var(--accent); background: var(--bg-surface); border: 1px solid var(--border-hover);
  padding: 8px 18px; border-radius: var(--r-md); white-space: nowrap;
}

/* ── GRID PRINCIPAL ──────────────────────────────────────────── */
.cronograma-grid { display: grid; grid-template-columns: 1fr 340px; gap: var(--s4); align-items: start; }

/* ── CALENDÁRIO SEMANAL ──────────────────────────────────────── */
.semana-wrap {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
}
.semana-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--s2) var(--s3); border-bottom: 1px solid var(--border);
}
.semana-nav__titulo { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); }
.btn-nav-seta {
  background: none; border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--text-secondary); cursor: pointer; padding: 5px 8px;
}

.semana-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
.semana-header__dia { padding: 10px 4px; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-secondary); }
.semana-corpo { display: grid; grid-template-columns: repeat(7, 1fr); min-height: 320px; }
.dia-col { border-right: 1px solid var(--border); padding: var(--s1); display: flex; flex-direction: column; gap: 4px; min-height: 320px; }
.dia-col.hoje { background: rgba(56,189,248,.05); }

.tarefa-bloco {
  border-radius: 6px; padding: 5px 7px; font-size: 11px; font-weight: 600;
  cursor: pointer; border-left: 3px solid transparent;
}
.tarefa-bloco.feita { opacity: 0.4; text-decoration: line-through; }
.tarefa-bloco--alta   { background: rgba(239,68,68,.15); border-color: #ef4444; color: #fca5a5; }
.tarefa-bloco--media  { background: rgba(251,191,36,.15); border-color: #f59e0b; color: #fcd34d; }
.tarefa-bloco--baixa  { background: rgba(34,197,94,.15); border-color: #22c55e; color: #86efac; }

/* ── PAINEL LATERAL ──────────────────────────────────────────── */
.secao { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: var(--s3); margin-bottom: var(--s3); }
.resumo-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.resumo-item:last-child { border-bottom: none; }
.prog-track { height: 6px; background: var(--border); border-radius: 10px; margin-top: 8px; }
.prog-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.5s ease; }
  </style>
</head>
