<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando... | StudyFlow</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Loading Screen Styles */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    
    .cat-loader {
      position: relative;
      width: 200px;
      height: 120px;
    }
    
    /* Gato dormindo SVG */
    .cat-svg {
      width: 100%;
      height: 100%;
    }
    
    /* Animacao do rabo */
    .cat-tail {
      transform-origin: 85% 75%;
      animation: tail 0.5s ease-in infinite alternate-reverse;
    }
    
    @keyframes tail {
      0% { transform: rotateZ(10deg); }
      50% { transform: rotateZ(0deg); }
      100% { transform: rotateZ(-10deg); }
    }
    
    /* Animacao dos Zzz */
    .zzz {
      position: absolute;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--accent);
      animation: zzz 2s linear infinite;
    }
    
    .zzz-1 {
      top: 5px;
      right: 30px;
      font-size: 14px;
      animation-delay: 0s;
    }
    
    .zzz-2 {
      top: -10px;
      right: 15px;
      font-size: 18px;
      animation-delay: 0.3s;
    }
    
    .zzz-3 {
      top: -25px;
      right: 0px;
      font-size: 22px;
      animation-delay: 0.6s;
    }
    
    @keyframes zzz {
      0% { opacity: 0; transform: translateY(10px) scale(0.8); }
      50% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-10px) scale(1.1); }
    }
    
    /* Texto de loading */
    .loading-text {
      text-align: center;
    }
    
    .loading-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .loading-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    /* Barra de progresso */
    .loading-progress {
      width: 200px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    
    .loading-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 99px;
      animation: progress 2s ease-in-out infinite;
    }
    
    @keyframes progress {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
    
    /* Dots animados */
    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
    }
    
    .loading-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: dot-bounce 1.4s ease-in-out infinite;
    }
    
    .loading-dot:nth-child(1) { animation-delay: 0s; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading-screen">
    <div class="loading-container">
      
      <!-- Gato Dormindo -->
      <div class="cat-loader">
        <svg class="cat-svg" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Corpo do gato -->
          <ellipse cx="100" cy="70" rx="60" ry="25" fill="var(--accent)"/>
          
          <!-- Cabeca -->
          <circle cx="45" cy="55" r="25" fill="var(--accent)"/>
          
          <!-- Orelhas -->
          <path d="M25 35 L30 55 L40 45 Z" fill="var(--accent)"/>
          <path d="M55 35 L60 55 L50 45 Z" fill="var(--accent)"/>
          <path d="M28 38 L32 52 L38 45 Z" fill="var(--accent-light)"/>
          <path d="M52 38 L58 52 L48 45 Z" fill="var(--accent-light)"/>
          
          <!-- Olhos fechados (dormindo) -->
          <path d="M35 52 Q40 55 45 52" stroke="var(--bg-base)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M48 52 Q53 55 58 52" stroke="var(--bg-base)" stroke-width="2" stroke-linecap="round" fill="none"/>
          
          <!-- Nariz -->
          <ellipse cx="45" cy="60" rx="3" ry="2" fill="var(--accent-light)"/>
          
          <!-- Bigodes -->
          <line x1="20" y1="58" x2="35" y2="60" stroke="var(--bg-base)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="63" x2="35" y2="63" stroke="var(--bg-base)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="55" y1="60" x2="70" y2="58" stroke="var(--bg-base)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="55" y1="63" x2="70" y2="63" stroke="var(--bg-base)" stroke-width="1.5" stroke-linecap="round"/>
          
          <!-- Patas dianteiras -->
          <ellipse cx="70" cy="85" rx="10" ry="6" fill="var(--accent)"/>
          <ellipse cx="90" cy="87" rx="8" ry="5" fill="var(--accent)"/>
          
          <!-- Rabo com animacao -->
          <path class="cat-tail" d="M160 65 Q180 50 175 75 Q170 90 155 80" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>
        
        <!-- Zzz flutuantes -->
        <span class="zzz zzz-1">z</span>
        <span class="zzz zzz-2">z</span>
        <span class="zzz zzz-3">Z</span>
      </div>
      
      <!-- Texto -->
      <div class="loading-text">
        <h2 class="loading-title">Preparando seus estudos...</h2>
        <p class="loading-subtitle">O gatinho esta descansando enquanto carrega</p>
      </div>
      
      <!-- Barra de progresso -->
      <div class="loading-progress">
        <div class="loading-progress-bar"></div>
      </div>
      
      <!-- Dots -->
      <div class="loading-dots">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      
    </div>
  </div>

  <script>
    // Esconde o loading apos 2.5 segundos (ou quando a pagina carregar)
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('loading-screen').classList.add('hidden');
      }, 2500);
    });
  </script>
</body>
</html>
