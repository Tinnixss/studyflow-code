  <main class="dashboard container">
    <div class="dashboard__header">
      <div>
        <h1 class="dashboard__titulo">Minha Jornada</h1>
        <p class="dashboard__subtitulo" id="data-hoje">Carregando data...</p>
      </div>
      <button id="btn-nova-tarefa" class="btn-primario" aria-haspopup="dialog">
        <span>➕</span> Nova Tarefa
      </button>
    </div>

    <section class="crono-grid">
      <div class="crono-painel">
        <h2 class="painel-titulo">📋 Fila de Execução</h2>
        <div id="lista-tarefas" class="tarefas-feed"></div>
      </div>

      <div class="crono-painel">
        <h2 class="painel-titulo">🗓️ Distribuição Semanal</h2>
        <div class="calendario-grid" id="calendario-semana"></div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-tarefa" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal__conteudo">
      <div class="modal__header">
        <h3 id="modal-titulo" class="modal__titulo">Nova Missão de Estudo</h3>
        <button id="modal-tarefa-fechar" class="modal__fechar" aria-label="Fechar modal">✕</button>
      </div>
      
      <div class="modal__corpo">
        <div class="form-grupo">
          <label for="t-nome">O que você vai estudar?</label>
          <input type="text" id="t-nome" placeholder="Ex: Estudar Sintaxe de JavaScript" required>
        </div>

        <div class="form-grupo">
          <label for="t-materia">Matéria / Disciplina</label>
          <input type="text" id="t-materia" placeholder="Ex: Programação (Padrão: Geral)">
        </div>

        <div class="form-grupo">
          <label for="t-data">Data de Execução</label>
          <input type="date" id="t-data" required>
        </div>

        <div class="form-grupo">
          <label for="t-horas">Tempo Estimado (Horas)</label>
          <input type="number" id="t-horas" min="0.5" step="0.5" placeholder="Ex: 2">
        </div>

        <input type="hidden" id="t-urgencia" value="3">
        <input type="hidden" id="t-complexidade" value="3">
      </div>

      <div class="modal__acoes">
        <button id="modal-tarefa-cancelar" class="btn-secundario">Cancelar</button>
        <button id="modal-tarefa-salvar" class="btn-primario">Salvar Missão</button>
      </div>
    </div>
  </div>

  <script>
    // Configurações Locais Isoladas
    const uInput = document.getElementById('t-urgencia');
    const cInput = document.getElementById('t-complexidade');

    const carregar = () => {
      try { return JSON.parse(localStorage.getItem('sf-tarefas')) || []; } catch { return []; }
    };
    const salvar = (t) => {
      try { localStorage.setItem('sf-tarefas', JSON.stringify(t)); } catch {}
    };

    let tarefas = carregar();

    const fmt = (d) => d.toISOString().split('T')[0];
    const obterDiasSemana = () => {
      const hoje = new Date();
      const diaSemana = hoje.getDay(); 
      const segunda = new Date(hoje);
      segunda.setDate(hoje.getDate() - (diaSemana === 0 ? 6 : diaSemana - 1));
      
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(segunda);
        d.setDate(segunda.getDate() + i);
        return d;
      });
    };

    // ── RENDERIZADORES DO DOM ─────────────────────────────────────
    function renderCalendario() {
      const cal = document.getElementById('calendario-semana');
      if (!cal) return;
      cal.innerHTML = '';

      const dias = obterDiasSemana();
      const nomes = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];

      dias.forEach((dataDia, i) => {
        const strDia = fmt(dataDia);
        const tarefasDoDia = tarefas.filter(t => t.data === strDia);
        
        // Calcula horas acumuladas
        const totalHoras = tarefasDoDia.reduce((acc, t) => acc + (t.horas || 0), 0);

        const diaCard = document.createElement('div');
        diaCard.className = `cal-dia ${fmt(new Date()) === strDia ? 'hoje' : ''}`;
        
        diaCard.innerHTML = `
          <div class="cal-dia__header">
            <span class="cal-dia__nome">${nomes[i]}</span>
            <span class="cal-dia__num">${dataDia.getDate()}</span>
          </div>
          <div class="cal-dia__tarefas">
            ${tarefasDoDia.map(t => `
              <div class="cal-tarefa ${t.feita ? 'feita' : ''}" title="${t.nome}">
                ${t.nome}
              </div>
            `).join('')}
            ${tarefasDoDia.length === 0 ? '<span class="cal-vazio">Livre</span>' : ''}
          </div>
          <div class="cal-dia__footer">${totalHoras}h planejadas</div>
        `;
        cal.appendChild(diaCard);
      });
    }

    function renderTarefas() {
      const feed = document.getElementById('lista-tarefas');
      if (!feed) return;
      feed.innerHTML = '';

      // Ordena tarefas por prioridade P = U * C decrescente, e não feitas no topo
      const ordenadas = [...tarefas].sort((a, b) => {
        if (a.feita !== b.feita) return a.feita ? 1 : -1;
        return (b.U * b.C) - (a.U * a.C);
      });

      if (ordenadas.length === 0) {
        feed.innerHTML = `
          <div style="text-align:center; padding:32px; color:var(--text-secondary);">
            <p style="font-size:32px; margin-bottom:12px;">🎯</p>
            <p>Nenhuma tarefa agendada. Clique em "Nova Tarefa" para começar!</p>
          </div>
        `;
        return;
      }

      ordenadas.forEach(t => {
        const p = t.U * t.C;
        const item = document.createElement('div');
        item.className = `tarefa-card ${t.feita ? 'feita' : ''}`;
        
        item.innerHTML = `
          <div class="tarefa-card__check" onclick="alternarTarefa(${t.id})" role="checkbox" aria-checked="${t.feita}" tabindex="0">
            ${t.feita ? '✅' : '⭕'}
          </div>
          <div class="tarefa-card__info">
            <h3 class="tarefa-card__nome">${t.nome}</h3>
            <div class="tarefa-card__meta">
              <span class="tag-materia">${t.materia}</span>
              <span>📅 ${t.data.split('-').reverse().slice(0,2).join('/')}</span>
              <span>⏳ ${t.horas}h</span>
            </div>
          </div>
          <div class="tarefa-card__prioridade">
            <span class="p-fogo">🔥 P: ${p}</span>
          </div>
          <button class="tarefa-card__deletar" onclick="removerTarefa(${t.id})" aria-label="Excluir tarefa">🗑️</button>
        `;
        feed.appendChild(item);
      });
    }

    // ── OPERAÇÕES DAS TAREFAS ─────────────────────────────────────
    window.alternarTarefa = function(id) {
      tarefas = tarefas.map(t => t.id === id ? { ...t, feita: !t.feita } : t);
      salvar(tarefas);
      renderTarefas();
      renderCalendario();
      if(typeof showToast === 'function') showToast('Status da missão atualizado!');
    };

    window.removerTarefa = function(id) {
      tarefas = tarefas.filter(t => t.id !== id);
      salvar(tarefas);
      renderTarefas();
      renderCalendario();
      if(typeof showToast === 'function') showToast('Missão removida com sucesso!', 'aviso');
    };

    // Lógica do Modal
    const modal = document.getElementById('modal-tarefa');
    document.getElementById('btn-nova-tarefa')?.addEventListener('click', () => {
      document.getElementById('t-nome').value = '';
      document.getElementById('t-materia').value = '';
      document.getElementById('t-data').value = fmt(new Date());
      document.getElementById('t-horas').value = '';
      modal.classList.add('aberto');
    });

    const fecharModal = () => modal.classList.remove('aberto');
    document.getElementById('modal-tarefa-fechar')?.addEventListener('click', fecharModal);
    document.getElementById('modal-tarefa-cancelar')?.addEventListener('click', fecharModal);

    document.getElementById('modal-tarefa-salvar')?.addEventListener('click', () => {
      const nome = document.getElementById('t-nome').value.trim();
      const materia = document.getElementById('t-materia').value.trim() || 'Geral';
      const data = document.getElementById('t-data').value;
      const horas = parseFloat(document.getElementById('t-horas').value) || 1;

      if (!nome) { 
        if (typeof showToast === 'function') showToast('Defina um nome para a tarefa!', 'erro');
        return; 
      }

      const nova = {
        id: Date.now(),
        nome,
        materia,
        data,
        horas,
        U: parseInt(uInput.value),
        C: parseInt(cInput.value),
        feita: false
      };

      tarefas.push(nova);
      salvar(tarefas);
      fecharModal();
      renderTarefas();
      renderCalendario();
      if(typeof showToast === 'function') showToast('Tarefa inserida com sucesso!', 'sucesso');
    });

    // ── INITIALIZATION ────────────────────────────────────────────
    const hoje = new Date();
    const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('data-hoje').textContent = hoje.toLocaleDateString('pt-BR', opcoes);

    renderCalendario();
    renderTarefas();
  </script>
