  <main class="dashboard container display-foco">
    <section class="pomodoro-container">
      <div class="pomodoro-modos">
        <button class="modo-btn ativo" data-modo="pomodoro">⏱️ Pomodoro</button>
        <button class="modo-btn" data-modo="curto">☕ Pausa Curta</button>
        <button class="modo-btn" data-modo="longo">🔋 Pausa Longa</button>
      </div>

      <div class="timer-display">
        <svg class="timer-anel" viewBox="0 0 220 220">
          <circle class="timer-anel__bg" cx="110" cy="110" r="100" />
          <circle class="timer-anel__progresso" id="anel-progresso" cx="110" cy="110" r="100" />
        </svg>
        <div class="timer-tempo" id="tempo-display">25:00</div>
      </div>

      <div class="pomodoro-controles">
        <button id="btn-reiniciar" class="btn-circular" aria-label="Reiniciar temporizador">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        </button>
        <button id="btn-play" class="btn-play" aria-label="Iniciar foco">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id=\"icone-play\"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button id="btn-pular" class="btn-circular" aria-label="Pular sessão">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
    </section>
  </main>

  <script>
    // Lógica do Temporizador Pomodoro Interno
    const tempos = { pomodoro: 25 * 60, curto: 5 * 60, longo: 15 * 60 };
    let modoAtual = 'pomodoro';
    let totalSegundos = tempos[modoAtual];
    let segundosRestantes = totalSegundos;
    let intervalo = null;
    let rodando = false;

    function renderDisplay() {
      const min = Math.floor(segundosRestantes / 60).toString().padStart(2, '0');
      const seg = (segundosRestantes % 60).toString().padStart(2, '0');
      document.getElementById('tempo-display').textContent = `${min}:${seg}`;
    }

    function renderAnel() {
      const anel = document.getElementById('anel-progresso');
      if (!anel) return;
      const circunferencia = 2 * Math.PI * 100; // r=100
      anel.style.strokeDasharray = circunferencia;
      const progresso = (totalSegundos - segundosRestantes) / totalSegundos;
      anel.style.strokeDashoffset = circunferencia * progresso;
    }

    function iniciar() {
      rodando = true;
      document.getElementById('btn-play').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icone-pausa"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
      intervalo = setInterval(() => {
        if (segundosRestantes > 0) {
          segundosRestantes--;
          renderDisplay();
          renderAnel();
        } else {
          clearInterval(intervalo);
          concluirSessao();
        }
      }, 1000);
    }

    function pausar() {
      rodando = false;
      clearInterval(intervalo);
      document.getElementById('btn-play').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icone-play"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    }

    async function concluirSessao() {
      rodando = false;
      if (modoAtual === 'pomodoro') {
        if (typeof showToast === 'function') showToast('Parabéns! Sessão de foco concluída.', 'sucesso');
        
        // Comunicação segura com o controller centralizado
        if (typeof salvarSessaoPomodoro === 'function') {
          await salvarSessaoPomodoro({ duracao: Math.floor(totalSegundos / 60), tipo: 'Pomodoro' });
        }
      }
      trocarModo(modoAtual === 'pomodoro' ? 'curto' : 'pomodoro');
    }

    function trocarModo(modo) {
      modoAtual = modo;
      totalSegundos = tempos[modoAtual];
      segundosRestantes = totalSegundos;
      document.querySelectorAll('.modo-btn').forEach(b => b.classList.toggle('ativo', b.dataset.modo === modo));
      document.getElementById('btn-play').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icone-play"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      renderDisplay();
      renderAnel();
    }

    // ── EVENTOS ────────────────────────────────────────────────────
    document.getElementById('btn-play').addEventListener('click', () => {
      if (rodando) pausar(); else iniciar();
    });
    document.getElementById('btn-reiniciar').addEventListener('click', () => {
      clearInterval(intervalo); rodando = false;
      segundosRestantes = totalSegundos;
      renderDisplay(); renderAnel();
      document.getElementById('btn-play').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icone-play"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    });
    document.getElementById('btn-pular').addEventListener('click', () => {
      clearInterval(intervalo); concluirSessao();
    });
    document.querySelectorAll('.modo-btn').forEach(btn => {
      btn.addEventListener('click', () => trocarModo(btn.dataset.modo));
    });

    // ── INIT ───────────────────────────────────────────────────────
    renderDisplay();
    renderAnel();
  </script>

  <script src="../../../js/core.js"></script>
  <script src="../../../js/db.js"></script>
  <script src="../../../js/controller.js"></script>
</body>
</html>
