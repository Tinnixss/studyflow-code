<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inscrição - 1º Hackathon de Informática da Escola</title>
</head>
<body>

    <h1>1º Hackathon de Informática da Escola</h1>

    <form action="#" method="post" enctype="multipart/form-data">

        <!-- BLOCO 1 - DADOS PESSOAIS -->
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>
            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
            <br><br>

            <label for="senha">Senha para o Sistema:</label>
            <input type="password" id="senha" name="senha" required>
            <br><br>

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" name="dataNascimento" required>

        </fieldset>

        <br>

        <!-- BLOCO 2 - PERFIL TÉCNICO -->
        <fieldset>
            <legend>Perfil Técnico</legend>

            <p>Quais linguagens você tem interesse?</p>

            <input type="checkbox" id="html" name="linguagens" value="HTML">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="linguagens" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="javascript" name="linguagens" value="JavaScript">
            <label for="javascript">JavaScript</label><br>

            <input type="checkbox" id="python" name="linguagens" value="Python">
            <label for="python">Python</label>

            <br><br>

            <p>Nível de Experiência:</p>

            <input type="radio" id="iniciante" name="nivel" value="Iniciante" required>
            <label for="iniciante">Iniciante</label><br>

            <input type="radio" id="intermediario" name="nivel" value="Intermediário">
            <label for="intermediario">Intermediário</label><br>

            <input type="radio" id="avancado" name="nivel" value="Avançado">
            <label for="avancado">Avançado</label>

            <br><br>

            <label for="curriculo">Anexar Currículo ou Portfólio:</label>
            <input type="file" id="curriculo" name="curriculo" accept=".pdf,.doc,.docx">

        </fieldset>

        <br>

        <!-- BLOCO 3 - DETALHES DO EVENTO -->
        <fieldset>
            <legend>Detalhes do Evento</legend>

            <label for="camiseta">Tamanho da Camiseta:</label>
            <select id="camiseta" name="camiseta" required>
                <option value="">Selecione</option>
                <option value="P">P</option>
                <option value="M">M</option>
                <option value="G">G</option>
                <option value="GG">GG</option>
            </select>

            <br><br>

            <label for="motivacao">Carta de Motivação:</label><br>
            <textarea id="motivacao" name="motivacao" rows="6" cols="50" required></textarea>

        </fieldset>

        <br>

        <button type="submit">Enviar Inscrição</button>

    </form>

</body>
</html>
